name: CI/CD — Build & Deploy

on:
  push:
    branches: ["infra/docker-compose-setup-and-traefik"]
  pull_request:
    branches: ["infra/docker-compose-setup-and-traefik"]

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build with Gradle
        run: ./gradlew build -x test

      # ARM64 이미지 빌드를 위한 QEMU + Buildx 설정
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name == 'push' }}   # PR에서는 build만, push 시에만 push
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest
          no-cache: true

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/sws"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ~/sws

            echo "${{ secrets.ENV_FILE }}" > .env

            # docker compose plugin 확인 (없으면 설치)
            if ! docker compose version &>/dev/null; then
              sudo apt-get update -y && sudo apt-get install -y docker-compose-plugin
            fi

            # letsencrypt 초기화 (최초 1회)
            mkdir -p letsencrypt
            if [ ! -f letsencrypt/acme.json ]; then
              touch letsencrypt/acme.json
              chmod 600 letsencrypt/acme.json
            fi

            export SWS_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}"

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans

            # Spring Boot 헬스체크 대기 (최대 90초)
            echo "Waiting for Spring Boot to become healthy..."
            for i in $(seq 1 18); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' sws 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then
                echo "Deploy complete. (${i}0s elapsed)"
                break
              fi
              echo "[$i/18] status=$STATUS, retrying in 5s..."
              sleep 5
              if [ "$i" = "18" ]; then
                echo "ERROR: sws did not become healthy within 90s"
                docker compose logs --tail=50 spring
                exit 1
              fi
            done

            # 미사용 이미지 정리
            docker image prune -f