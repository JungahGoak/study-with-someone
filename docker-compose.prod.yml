# HTTPS overlay — production only
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   mkdir -p letsencrypt && touch letsencrypt/acme.json && chmod 600 letsencrypt/acme.json
#
# Required .env variables:
#   ACME_EMAIL=your@email.com
#   DOMAIN=yourdomain.com

services:

  traefik:
    # Replaces base command entirely — include all flags here
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--log.level=INFO"
      - "--ping=true"
    ports:
      - "443:443"
    volumes:
      - "./letsencrypt:/letsencrypt"

  spring:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sws.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.sws.entrypoints=websecure"
      - "traefik.http.routers.sws.tls.certresolver=myresolver"
      - "traefik.http.services.sws.loadbalancer.server.port=8080"
      - "traefik.http.routers.sws.middlewares=rate-limit@docker,body-limit@docker,secure-headers@docker"