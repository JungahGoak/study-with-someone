<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>Study With Someone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { -webkit-font-smoothing:antialiased; }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-900 p-4">

<div class="max-w-7xl mx-auto">
    <!-- Header -->
    <div class="bg-white/10 backdrop-blur-md rounded-2xl p-6 mb-6 shadow-2xl flex items-center justify-between">
        <div class="flex items-center gap-3">
            <i data-lucide="users" class="w-8 h-8 text-white"></i>
            <h1 class="text-3xl font-bold text-white">Study With Someone</h1>
        </div>

        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <div id="connectionDot" class="w-3 h-3 rounded-full bg-gray-400"></div>
                <span id="connectionStatus" class="text-white/80 text-sm">disconnected</span>
            </div>
            <div id="myIdBox" class="text-white/60 text-sm hidden">
                ID: <span id="myIdShort"></span>
            </div>
        </div>
    </div>

    <!-- Video Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <!-- Local Video -->
        <div class="bg-white/10 backdrop-blur-md rounded-2xl overflow-hidden shadow-2xl">
            <div class="bg-white/5 px-4 py-3 border-b border-white/10 flex justify-between">
                <h2 class="text-white font-semibold">내 화면 (Publishing)</h2>
                <span id="publishingTo" class="text-green-400 text-sm hidden"></span>
            </div>
            <div class="relative bg-black aspect-video">
                <video id="localVideo" autoplay muted playsinline class="w-full h-full object-cover"></video>

                <div id="localVideoOff" class="absolute inset-0 hidden bg-gray-900 flex items-center justify-center">
                    <i data-lucide="video-off" class="w-16 h-16 text-white/50"></i>
                </div>
            </div>
        </div>

        <!-- Remote Video -->
        <div class="bg-white/10 backdrop-blur-md rounded-2xl overflow-hidden shadow-2xl">
            <div class="bg-white/5 px-4 py-3 border-b border-white/10 flex justify-between">
                <h2 class="text-white font-semibold">스터디 파트너 (Subscribing)</h2>
                <span id="subscribingFrom" class="text-blue-400 text-sm hidden"></span>
            </div>
            <div class="relative bg-black aspect-video">
                <video id="remoteVideo" autoplay playsinline class="w-full h-full object-cover"></video>

                <div id="remoteWaiting" class="absolute inset-0 flex items-center justify-center bg-gray-900">
                    <div class="text-center">
                        <i data-lucide="users" class="w-16 h-16 text-white/30 mx-auto mb-4"></i>
                        <p class="text-white/50">매칭 대기 중...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="bg-white/10 backdrop-blur-md rounded-2xl p-6 shadow-2xl flex justify-center gap-4">
        <button id="btnDisconnect" class="p-4 rounded-full bg-red-500 hover:bg-red-600 text-white transition-all">
            <i data-lucide="log-out" class="w-6 h-6"></i>
        </button>
    </div>

    <!-- Status Box -->
    <div class="mt-6 bg-white/5 backdrop-blur-md rounded-xl p-4 text-white text-sm grid grid-cols-2 gap-4">
        <div>
            <span class="text-white/60">Publishing to:</span>
            <span id="publishingStatus" class="ml-2">없음</span>
        </div>
        <div>
            <span class="text-white/60">Subscribing from:</span>
            <span id="subscribingStatus" class="ml-2">없음</span>
        </div>
    </div>
</div>

<script>
    /* ======================================
       전역 상태 / 버퍼
       ====================================== */
    const WS_URL = "ws://localhost:8080/signal"; // 필요하면 변경
    let ws = null;

    let myId = null;
    let publisherId = null;   // who I'm subscribing from
    let subscriberId = null;  // who I'm publishing to

    let localStream = null;
    let publishPC = null;
    let subscribePC = null;

    const pendingIce = new Map();   // peerId -> [RTCIceCandidateInit,...]
    const pendingOffers = new Map(); // peerId -> raw message (string data or null)

    const config = {
        iceServers: [
            { urls: "stun:stun.l.google.com:19302" },
            { urls: "stun:stun1.l.google.com:19302" }
        ]
    };

    /* ======================================
       DOM
       ====================================== */
    const localVideo = document.getElementById("localVideo");
    const remoteVideo = document.getElementById("remoteVideo");
    const remoteWaiting = document.getElementById("remoteWaiting");
    const publishingTo = document.getElementById("publishingTo");
    const subscribingFrom = document.getElementById("subscribingFrom");
    const publishingStatus = document.getElementById("publishingStatus");
    const subscribingStatus = document.getElementById("subscribingStatus");
    const connectionStatus = document.getElementById("connectionStatus");
    const connectionDot = document.getElementById("connectionDot");
    const myIdBox = document.getElementById("myIdBox");
    const myIdShort = document.getElementById("myIdShort");

    /* ======================================
       유틸: 로깅
       ====================================== */
    function log(...v) {
        console.log(...v);
    }

    /* ======================================
       WebSocket 연결
       ====================================== */
    function connectWS() {
        ws = new WebSocket(WS_URL);

        ws.onopen = async () => {
            connectionStatus.textContent = "connected";
            connectionDot.classList.remove("bg-gray-400");
            connectionDot.classList.add("bg-green-400");

            // 미리 로컬 미디어를 열어두면 후속 매칭에서 안정적
            try {
                await ensureLocalStream();
                log("Local stream ready on WS open");
            } catch (e) {
                log("getUserMedia failed at WS open:", e);
            }
        };

        ws.onmessage = async (ev) => {
            let msg;
            try { msg = JSON.parse(ev.data); }
            catch (e) { log("Invalid WS message:", ev.data); return; }

            log("WS RECV:", msg);

            // server will set myId on initial messages, but treat defensively
            myId = msg.myId ?? myId;

            switch (msg.type) {
                case "PUBLISH":
                    // I'm asked to publish -> create new publish PC and send offer
                    subscriberId = msg.targetId;
                    showMyId();
                    await preparePublish(subscriberId);
                    break;

                case "SUBSCRIBE":
                    // I'm asked to subscribe -> create subscribe PC and wait for OFFER
                    publisherId = msg.targetId;
                    showMyId();
                    await prepareSubscribe(publisherId);
                    break;

                case "OFFER":
                    await handleOffer(msg);
                    break;

                case "ANSWER":
                    await handleAnswer(msg);
                    break;

                case "ICE":
                    await handleIce(msg);
                    break;

                case "LEAVE":
                    handleLeave(msg);
                    break;

                case "ERROR":
                    log("Server ERROR:", msg.data);
                    break;

                default:
                    log("Unknown message type:", msg.type);
            }
        };

        ws.onclose = () => {
            connectionStatus.textContent = "disconnected";
            connectionDot.classList.remove("bg-green-400");
            connectionDot.classList.add("bg-gray-400");
            cleanupAll();
        };

        ws.onerror = (e) => {
            log("WS error", e);
        };
    }

    function sendMsg(obj) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return log("WS not open");
        try {
            // keep data serialized (server expects String in SignalMessage.data)
            ws.send(JSON.stringify(obj));
            log("WS SEND:", obj.type, obj.targetId ?? "");
        } catch (e) {
            log("WS send err", e);
        }
    }

    /* ======================================
       Local media (항상 미리 켜두기)
       ====================================== */
    async function ensureLocalStream() {
        if (localStream) return localStream;
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            localVideo.srcObject = localStream;
            return localStream;
        } catch (e) {
            log("getUserMedia error:", e);
            throw e;
        }
    }

    /* ======================================
       PeerConnection 생성/종료 helpers
       ====================================== */
    function makePublishPC(targetId) {
        // close existing
        if (publishPC) {
            try { publishPC.close(); } catch {}
            publishPC = null;
        }

        const pc = new RTCPeerConnection(config);

        // add local tracks (publisher)
        if (localStream) {
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        }

        pc.onicecandidate = (e) => {
            if (e.candidate) {
                // send candidate as string
                sendMsg({ type: "ICE", targetId, data: JSON.stringify({ candidate: e.candidate }) });
            }
        };

        pc.onconnectionstatechange = () => log("publishPC state:", pc.connectionState);

        // publisher intentionally ignores remote tracks (one-way)
        pc.ontrack = (e) => {
            log("publishPC ontrack (ignored)", e);
        };

        publishPC = pc;
        return pc;
    }

    function makeSubscribePC(targetId) {
        if (subscribePC) {
            try { subscribePC.close(); } catch {}
            subscribePC = null;
        }

        const pc = new RTCPeerConnection(config);

        pc.ontrack = (e) => {
            log("subscribePC ontrack");
            if (e.streams && e.streams[0]) {
                remoteVideo.srcObject = e.streams[0];
            } else {
                const s = new MediaStream();
                s.addTrack(e.track);
                remoteVideo.srcObject = s;
            }
            remoteWaiting.classList.add("hidden");
        };

        pc.onicecandidate = (e) => {
            if (e.candidate) {
                sendMsg({ type: "ICE", targetId, data: JSON.stringify({ candidate: e.candidate }) });
            }
        };

        pc.onconnectionstatechange = () => log("subscribePC state:", pc.connectionState);

        subscribePC = pc;
        return pc;
    }

    function closePublishPC() {
        if (publishPC) { try { publishPC.close(); } catch {} publishPC = null; }
        publishingTo.classList.add("hidden");
        publishingStatus.textContent = "없음";
    }

    function closeSubscribePC() {
        if (subscribePC) { try { subscribePC.close(); } catch {} subscribePC = null; }
        subscribingFrom.classList.add("hidden");
        subscribingStatus.textContent = "없음";
        remoteVideo.srcObject = null;
        remoteWaiting.classList.remove("hidden");
    }

    /* ======================================
       Prepare publish / subscribe (called on PUBLISH / SUBSCRIBE events)
       ====================================== */
    async function preparePublish(targetId) {
        // create fresh publish PC and produce OFFER
        await ensureLocalStream();

        // if publishing to different target than before, recreate
        if (subscriberId !== targetId) {
            closePublishPC();
        }
        subscriberId = targetId;

        const pc = makePublishPC(targetId);

        // create offer and send
        try {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            // server expects data string
            sendMsg({ type: "OFFER", targetId, data: JSON.stringify({ sdp: offer.sdp, type: offer.type }) });

            publishingTo.textContent = `송출 중 → ${targetId.slice(0,8)}...`;
            publishingTo.classList.remove("hidden");
            publishingStatus.textContent = `${targetId.slice(0,12)}...`;
        } catch (e) {
            log("preparePublish error:", e);
        }
    }

    async function prepareSubscribe(targetId) {
        // create fresh subscribe PC and be ready for OFFER
        if (publisherId !== targetId) {
            closeSubscribePC();
        }
        publisherId = targetId;

        makeSubscribePC(targetId);

        subscribingFrom.textContent = `수신 중 ← ${targetId.slice(0,8)}...`;
        subscribingFrom.classList.remove("hidden");
        subscribingStatus.textContent = `${targetId.slice(0,12)}...`;

        // If an offer was buffered earlier for this publisher, try to apply it now
        if (pendingOffers.has(targetId)) {
            const buffered = pendingOffers.get(targetId);
            pendingOffers.delete(targetId);
            if (buffered) {
                log("Applying buffered offer for", targetId);
                await handleOffer(buffered);
            }
        }
    }

    /* ======================================
       OFFER / ANSWER / ICE handlers
       ====================================== */
    async function handleOffer(msg) {
        // msg.myId is the publisher (who sent the offer)
        const fromId = msg.myId;
        // data expected to be stringified {sdp, type}
        let payload = null;
        try {
            payload = msg.data ? JSON.parse(msg.data) : null;
        } catch (e) {
            log("offer data parse error", e);
        }

        // if payload missing or no sdp -> buffer and return
        if (!payload || !payload.sdp) {
            log("OFFER missing SDP — buffering until proper offer arrives from", fromId);
            pendingOffers.set(fromId, msg);
            return;
        }

        // ensure subscribePC exists (we must be subscriber to handle offer)
        if (!subscribePC) {
            log("subscribePC not ready, creating (on offer)");
            await prepareSubscribe(fromId);
        }

        try {
            // setRemoteDescription using RTCSessionDescription (safer cross-browser)
            await subscribePC.setRemoteDescription(new RTCSessionDescription({ type: payload.type || "offer", sdp: payload.sdp }));
            log("Remote description (offer) set from", fromId);

            // apply any buffered ICE for this publisher
            await flushBufferedIceFor(fromId);

            // create answer and send
            const answer = await subscribePC.createAnswer();
            await subscribePC.setLocalDescription(answer);

            sendMsg({ type: "ANSWER", targetId: fromId, data: JSON.stringify({ sdp: answer.sdp, type: answer.type }) });
            log("Sent ANSWER to", fromId);
        } catch (e) {
            log("handleOffer error:", e);
        }
    }

    async function handleAnswer(msg) {
        const fromId = msg.myId; // answerer (subscriber)
        let payload = null;
        try { payload = msg.data ? JSON.parse(msg.data) : null; } catch (e) { log("answer parse err", e); }

        if (!payload || !payload.sdp) {
            log("ANSWER missing SDP — ignoring");
            return;
        }

        if (!publishPC) {
            log("No publishPC to apply ANSWER to; ignoring");
            return;
        }

        try {
            await publishPC.setRemoteDescription(new RTCSessionDescription({ type: payload.type || "answer", sdp: payload.sdp }));
            log("Remote description (answer) applied from", fromId);

            // flush any buffered ICE for that peer
            await flushBufferedIceFor(fromId);
        } catch (e) {
            log("handleAnswer error:", e);
        }
    }

    async function handleIce(msg) {
        const fromId = msg.myId;
        // server sends data as JSON-string of { candidate: {...} } or earlier code used just candidate object
        let payload = null;
        try { payload = msg.data ? JSON.parse(msg.data) : null; } catch (e) { log("ice parse err", e); }

        // normalize candidate object
        const candidateObj = payload && payload.candidate ? payload.candidate : (payload && payload.candidate === undefined ? payload : null);
        if (!candidateObj) {
            log("ICE message missing candidate:", msg);
            return;
        }

        // Determine which pc this ICE belongs to:
        // If fromId equals publisherId (i.e. publisher sent ICE) then it belongs to subscribePC
        // else it belongs to publishPC.
        let pc = null;
        if (fromId === publisherId) pc = subscribePC;
        else if (fromId === subscriberId) pc = publishPC;
        else {
            // fallback: try both
            pc = subscribePC || publishPC;
        }

        // if remoteDescription exists, add immediately; otherwise buffer
        try {
            if (pc && pc.remoteDescription && pc.remoteDescription.type) {
                await pc.addIceCandidate(new RTCIceCandidate(candidateObj));
                log("Added ICE immediate for", fromId);
            } else {
                log("Buffering ICE for", fromId);
                bufferIceFor(fromId, candidateObj);
            }
        } catch (e) {
            log("handleIce addIceCandidate error:", e);
        }
    }

    /* ======================================
       ICE buffer helpers
       ====================================== */
    function bufferIceFor(peerId, cand) {
        if (!pendingIce.has(peerId)) pendingIce.set(peerId, []);
        pendingIce.get(peerId).push(cand);
    }

    async function flushBufferedIceFor(peerId) {
        const arr = pendingIce.get(peerId);
        if (!arr) return;
        // try to add to both PCs if present (safe)
        for (const cand of arr) {
            try {
                if (subscribePC && subscribePC.remoteDescription && subscribePC.remoteDescription.type) {
                    await subscribePC.addIceCandidate(new RTCIceCandidate(cand));
                    log("Flushed ICE -> subscribePC for", peerId);
                    continue;
                }
                if (publishPC && publishPC.remoteDescription && publishPC.remoteDescription.type) {
                    await publishPC.addIceCandidate(new RTCIceCandidate(cand));
                    log("Flushed ICE -> publishPC for", peerId);
                    continue;
                }
                log("No suitable PC to flush ICE for", peerId);
            } catch (e) {
                log("flushBufferedIceFor error:", e);
            }
        }
        pendingIce.delete(peerId);
    }

    /* ======================================
       LEAVE handling & cleanup
       ====================================== */
    function handleLeave(msg) {
        log("LEAVE from", msg.myId);
        if (msg.myId === publisherId) {
            // publisher left: close subscribePC
            closeSubscribePC();
            publisherId = null;
        }
        if (msg.myId === subscriberId) {
            // subscriber left: close publishPC
            closePublishPC();
            subscriberId = null;
        }
    }

    function cleanupAll() {
        try { if (localStream) { localStream.getTracks().forEach(t => t.stop()); } } catch {}
        closePublishPC();
        closeSubscribePC();
        pendingIce.clear();
        pendingOffers.clear();
        localStream = null;
    }

    /* ======================================
       small UI helpers
       ====================================== */
    function showMyId() {
        if (!myId) return;
        myIdBox.classList.remove("hidden");
        myIdShort.textContent = myId.slice(0,8) + "...";
    }

    document.getElementById("btnDisconnect").onclick = () => {
        if (ws) try { ws.close(); } catch {}
        cleanupAll();
    };

    /* ======================================
       boot
       ====================================== */
    connectWS();
    lucide.createIcons();

</script>
</body>
</html>
